name: SmokeTrackerLocal
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: com.YHG.vmys
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait

targets:
  SmokeTrackerLocal:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Domain
      - path: Features
      - path: Resources
      - path: Shared
    settings:
      base:
        PRODUCT_NAME: SmokeTrackerLocal
        CODE_SIGN_ENTITLEMENTS: App/SmokeTrackerLocal.entitlements
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Smoke Tracker
        UILaunchStoryboardName: ""
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    dependencies:
      - target: SmokeTrackerWidget
        embed: true

  SmokeTrackerWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: ../SmokeTrackerWidget
      - path: Widget
      - path: Shared
    settings:
      base:
        PRODUCT_NAME: SmokeTrackerWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.YHG.vmys.widget
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: ../SmokeTrackerWidget/SmokeTrackerWidget.entitlements
    info:
      path: ../SmokeTrackerWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
